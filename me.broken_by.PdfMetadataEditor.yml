app-id: me.broken_by.PdfMetadataEditor
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: pmedit-cli
finish-args:
  - --share=ipc
  - --socket=x11
  - --device=dri
  - --filesystem=home
modules:
  - name: pdf-metadata-editor-app
    buildsystem: simple
    build-commands:
      - mv -v app/* ${FLATPAK_DEST}
      - install -Dm644 src/modules/editor-gui/jpackage/pdf-metadata-edit.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/me.broken_by.PdfMetadataEditor.png
      - install -Dm644 src/flatpak/me.broken_by.PdfMetadataEditor-mime.xml ${FLATPAK_DEST}/share/mime/packages/me.broken_by.PdfMetadataEditor.xml
      - install -Dm644 src/flatpak/me.broken_by.PdfMetadataEditor.desktop -t ${FLATPAK_DEST}/share/applications/
      - install -Dm644 src/flatpak/me.broken_by.PdfMetadataEditor.metainfo.xml -t ${FLATPAK_DEST}/share/metainfo/
    sources:
      - type: archive
        url: https://github.com/zaro/pdf-metadata-editor/releases/download/v4.1.1/pdf-metadata-editor-4.1.1-amd64-linux-portable.tar.gz
        sha256: 8c336179c462cdb56cefaebf4e0c47e74db5a6c833f66d932c3d998d896c6e3f
        dest: app
        only-arches:
          - x86_64
      - type: archive
        url: https://github.com/zaro/pdf-metadata-editor/releases/download/v4.1.1/pdf-metadata-editor-4.1.1-arm64-linux-portable.tar.gz
        sha256: d6df39c1cfa976a92e0bda567a7e40dbd01239e8ee6de5c12ada5d163060fc9c
        dest: app
        only-arches:
          - aarch64
      - type: archive
        url: https://github.com/zaro/pdf-metadata-editor/archive/refs/tags/v4.1.1.zip
        sha256: 3da89206edec5981f0694304b4348191ce1705a97974ffd8131042191092e1c3
        dest: src
