app-id: me.broken_by.PdfMetadataEditor
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: pmedit-cli
finish-args:
  - --share=ipc
  - --socket=x11
  - --device=dri
  - --filesystem=home
modules:
  - name: pdf-metadata-editor-app
    buildsystem: simple
    build-commands:
      - mv -v app/* ${FLATPAK_DEST}
      - install -Dm644 src/modules/editor-gui/jpackage/pdf-metadata-edit.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/me.broken_by.PdfMetadataEditor.png
      - install -Dm644 src/flatpak/me.broken_by.PdfMetadataEditor-mime.xml ${FLATPAK_DEST}/share/mime/packages/me.broken_by.PdfMetadataEditor.xml
      - install -Dm644 src/flatpak/me.broken_by.PdfMetadataEditor.desktop -t ${FLATPAK_DEST}/share/applications/
      - install -Dm644 src/flatpak/me.broken_by.PdfMetadataEditor.metainfo.xml -t ${FLATPAK_DEST}/share/metainfo/
    sources:
      - type: archive
        url: https://github.com/zaro/pdf-metadata-editor/releases/download/v4.1.0/pdf-metadata-editor-4.1.0-amd64-linux-portable.tar.gz
        sha256: 9bb179d728806a1bf447394aab58d915acdb25b7560a4f9fdd4b9404d8e9926d
        dest: app
        only-arches:
          - x86_64
      - type: archive
        url: https://github.com/zaro/pdf-metadata-editor/releases/download/v4.1.0/pdf-metadata-editor-4.1.0-arm64-linux-portable.tar.gz
        sha256: 322a01cf0c36443afc756aeaf8739d374f128b12099287c27ea95198aac765f1
        dest: app
        only-arches:
          - aarch64
      - type: archive
        url: https://github.com/zaro/pdf-metadata-editor/archive/refs/tags/v4.1.0.zip
        sha256: 209ed903d035ab42c691cee5dec509edae06d7c70ca9a5636c7eced77192404c
        dest: src
